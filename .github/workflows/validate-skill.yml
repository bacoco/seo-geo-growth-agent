name: Validate skill

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python syntax
        run: python3 -m py_compile scripts/validate_skill.py

      - name: Check installer syntax
        run: bash -n scripts/install.sh

      - name: Validate manifest, files, links, and install smoke test
        run: python3 scripts/validate_skill.py
