name: Feature request
description: Suggest a new reference, template, guardrail, or workflow.
title: "Feature: "
labels: [enhancement]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Sources / evidence
      description: Prefer official platform docs, measured data, or reproducible examples.
    validations:
      required: false
