name: Bug report
description: Report a problem with the skill, templates, or validation workflow.
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken or misleading?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or source
      description: Link official docs, logs, or reproducible examples when possible.
    validations:
      required: false
